name: Deploy Docs

on:
  push:
    branches: [ main ]   # 🚀 runs automatically when you push to main
  workflow_dispatch:     # optional, lets you trigger manually too

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout WorldLattice 2D
        uses: actions/checkout@v4
        with:
          repository: hanijahans/world-lattice-2d-web
          ref: main
          path: .external/world-lattice-2d-web

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build WorldLattice 2D and VitePress
        run: npm run build:all
        env:
          WORLDLATTICE_2D_DIR: .external/world-lattice-2d-web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist
          name: github-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
